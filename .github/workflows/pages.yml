name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'smial.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Needed for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Self-contained single file: serve it at the site root (index.html)
      # and keep the original name as a direct link.
      - name: Assemble site
        run: |
          mkdir _site
          cp smial.html _site/index.html
          cp smial.html _site/smial.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
