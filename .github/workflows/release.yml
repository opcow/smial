name: Release

on:
  push:
    tags:
      - 'v*'

# Needed to create/update the GitHub Release and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            archive: smial-windows.zip
          - os: macos-latest
            name: macos
            archive: smial-macos.tar.gz
          - os: ubuntu-latest
            name: linux
            archive: smial-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      # GLFW needs X11 dev headers; nfd needs GTK3; hidapi (hidraw backend) needs libudev
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            xorg-dev \
            libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item build/Release/smial.exe dist/
          Copy-Item build/Release/hidapi.dll   dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Package (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp build/smial dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
